cultivation.guide.loop.title=Core loop
cultivation.guide.loop.desc=Accumulate qi, then attempt a breakthrough when the progress bar is full.
cultivation.guide.gains.title=Qi gains
cultivation.guide.gains.desc=Passive gains keep running. When no travel is active, automatic seclusion adds extra qi; during travel, seclusion pauses and only passive gains remain. Meditation grants a small manual qi boost.
cultivation.guide.realms.title=Realms
cultivation.guide.realms.desc=Each realm marks a larger step in cultivation and asks for more qi before the next breakthrough.
cultivation.guide.travel.title=Travel
cultivation.guide.travel.desc=Choose a location and wait for the timer. Higher realms reduce travel duration by up to 50%. Claim rewards for qi, spirit stones, pills, or techniques when travel is complete.
cultivation.guide.abode.title=Abode
cultivation.guide.abode.desc=Spend spirit stones to upgrade facilities. The Spirit Gathering Array raises seclusion gains, the Spirit Vein produces stones, the Alchemy Room produces pills, and the Insight Room improves breakthrough chance.
cultivation.guide.bag.title=Bag
cultivation.guide.bag.desc=Equip techniques to shape your bonuses, and use pills for immediate rewards or breakthrough support.
cultivation.guide.breakthrough.title=Breakthrough
cultivation.guide.breakthrough.desc=Try a breakthrough when qi is full. Failure keeps part of your qi and improves later attempts.
