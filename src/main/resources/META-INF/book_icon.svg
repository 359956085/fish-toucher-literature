<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <!-- Fish body -->
  <ellipse cx="6.8" cy="6.8" rx="4.2" ry="3.5" fill="#FF9A5C" stroke="#D97A3A" stroke-width="0.35"/>
  <!-- Belly -->
  <ellipse cx="6.8" cy="8" rx="2.8" ry="1.6" fill="#FFDAB9" opacity="0.5"/>
  <!-- Tail -->
  <path d="M2.6 6.8C1.3 5 0.5 3.8 1 3.2C1.5 2.7 2.2 3.6 2.8 5" fill="#FF8040" stroke="#D97A3A" stroke-width="0.25"/>
  <path d="M2.6 6.8C1.3 8.6 0.5 9.8 1 10.4C1.5 10.9 2.2 10 2.8 8.6" fill="#FF8040" stroke="#D97A3A" stroke-width="0.25"/>
  <!-- Dorsal fin -->
  <path d="M5.5 3.5C6 2 7.5 1.6 8.2 2.6C8.5 3.1 7.5 3.5 6.5 3.8" fill="#FF8040" stroke="#D97A3A" stroke-width="0.2"/>
  <!-- Big eye -->
  <circle cx="8.5" cy="5.5" r="1.7" fill="white" stroke="#D97A3A" stroke-width="0.25"/>
  <circle cx="9" cy="5.3" r="1" fill="#1A1A2E"/>
  <circle cx="9.5" cy="4.9" r="0.4" fill="white"/>
  <!-- Cheek -->
  <ellipse cx="7.5" cy="7.5" rx="1" ry="0.6" fill="#FF7A8A" opacity="0.25"/>
  <!-- Smile -->
  <path d="M9.2 7.5C9.7 8.2 10.5 8.2 11 7.5" fill="none" stroke="#D97A3A" stroke-width="0.35" stroke-linecap="round"/>
</svg>
