<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <!-- Fish body - round cute -->
  <ellipse cx="6.5" cy="6.5" rx="4" ry="3.3" fill="#FFB347" stroke="#E8922D" stroke-width="0.4"/>
  <!-- Belly -->
  <ellipse cx="6.5" cy="7.5" rx="2.5" ry="1.5" fill="#FFD699" opacity="0.5"/>
  <!-- Tail -->
  <path d="M2.5 6.5C1.5 5 0.8 4 1.2 3.5C1.6 3 2.3 3.8 2.7 5" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.3"/>
  <path d="M2.5 6.5C1.5 8 0.8 9 1.2 9.5C1.6 10 2.3 9.2 2.7 8" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.3"/>
  <!-- Dorsal fin -->
  <path d="M5.5 3.5C6 2.3 7.2 2 7.8 2.8C8 3.2 7.3 3.5 6.5 3.5" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.2"/>
  <!-- Big eye -->
  <circle cx="8" cy="5.5" r="1.5" fill="white" stroke="#E8922D" stroke-width="0.3"/>
  <circle cx="8.5" cy="5.3" r="0.8" fill="#2D2D2D"/>
  <circle cx="8.8" cy="5" r="0.35" fill="white"/>
  <!-- Cheek blush -->
  <ellipse cx="7.2" cy="7.2" rx="0.8" ry="0.5" fill="#FF8FA0" opacity="0.3"/>
  <!-- Smile -->
  <path d="M8.8 7.2C9.2 7.8 10 7.8 10.3 7.2" fill="none" stroke="#E8922D" stroke-width="0.35" stroke-linecap="round"/>
</svg>
