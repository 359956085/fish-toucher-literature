<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="19" fill="#F0F4F8" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Fish body -->
  <ellipse cx="20" cy="14" rx="8" ry="4" fill="#FF6B35" stroke="#CC4400" stroke-width="0.7"/>
  <!-- Fish body highlight -->
  <ellipse cx="20" cy="12.5" rx="5" ry="1.8" fill="#FFA070" opacity="0.5"/>
  <!-- Fish tail -->
  <path d="M11.5 14L7.5 10.5L7.5 17.5Z" fill="#FF6B35" stroke="#CC4400" stroke-width="0.5"/>
  <!-- Fish dorsal fin -->
  <path d="M18 14L20 9L22 14" fill="#E85D26" stroke="#CC4400" stroke-width="0.3"/>
  <!-- Fish belly fin -->
  <path d="M18 16.5L19.5 18.5L21 16.5" fill="#E85D26" opacity="0.7"/>
  <!-- Fish eye -->
  <circle cx="25" cy="13" r="1.5" fill="white" stroke="#CC4400" stroke-width="0.3"/>
  <circle cx="25.4" cy="12.7" r="0.7" fill="#1A1A2E"/>
  <circle cx="25.7" cy="12.5" r="0.3" fill="white"/>
  <!-- Fish mouth -->
  <path d="M27.8 14.8C28.3 14.4 28.3 13.6 27.8 13.2" fill="none" stroke="#CC4400" stroke-width="0.5"/>
  <!-- Fish scales -->
  <path d="M14 13Q16 14.5 14 16" fill="none" stroke="#E85D26" stroke-width="0.4" opacity="0.5"/>
  <path d="M17 12.5Q19 14 17 15.5" fill="none" stroke="#E85D26" stroke-width="0.4" opacity="0.5"/>

  <!-- Hand - thumb from top -->
  <path d="M16 10C16 8 17 5.5 18.5 5C20 4.5 21 5.5 21 7L21 11"
        fill="#FDBCB4" stroke="#D4956B" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Thumb nail -->
  <ellipse cx="18.5" cy="5.5" rx="1.2" ry="0.8" fill="#F5D5CC" stroke="#D4956B" stroke-width="0.3"/>

  <!-- Hand - index finger from bottom -->
  <path d="M16 18C16 20 17 22.5 18.5 23C20 23.5 21 22.5 21 21L21 17"
        fill="#FDBCB4" stroke="#D4956B" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Index finger nail -->
  <ellipse cx="18.5" cy="22.5" rx="1.2" ry="0.8" fill="#F5D5CC" stroke="#D4956B" stroke-width="0.3"/>

  <!-- Palm/wrist area connecting to fingers -->
  <path d="M14 11C12 13 12 15 14 17L16 18L16 10Z"
        fill="#FDBCB4" stroke="#D4956B" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Middle, ring, ring fingers curled -->
  <path d="M13 13.5C11 14 10 15.5 10.5 17C11 18.5 12.5 18.5 14 17.5"
        fill="#FDBCB4" stroke="#D4956B" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M12 15C10 15.5 9 17 9.5 18.5C10 20 11.5 20 13 19"
        fill="#FDBCB4" stroke="#D4956B" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Pinch pressure lines -->
  <line x1="15" y1="10.5" x2="14" y2="9.5" stroke="#D4956B" stroke-width="0.3" opacity="0.5"/>
  <line x1="15" y1="17.5" x2="14" y2="18.5" stroke="#D4956B" stroke-width="0.3" opacity="0.5"/>
</svg>
