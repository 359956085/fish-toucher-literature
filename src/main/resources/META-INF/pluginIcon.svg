<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Fish body - chubby round shape -->
  <ellipse cx="20" cy="21" rx="13" ry="11" fill="#FF9A5C" stroke="#D97A3A" stroke-width="0.8"/>
  <!-- Belly highlight -->
  <ellipse cx="20" cy="25" rx="9" ry="5.5" fill="#FFDAB9" opacity="0.6"/>
  <!-- Body shine -->
  <ellipse cx="15" cy="16" rx="5" ry="3" fill="#FFB87A" opacity="0.5" transform="rotate(-20 15 16)"/>

  <!-- Tail fin - playful forked tail -->
  <path d="M7 21C3 15 1 11 2.5 9C4 7.5 6 10 7.5 14" fill="#FF8040" stroke="#D97A3A" stroke-width="0.6" stroke-linejoin="round"/>
  <path d="M7 21C3 27 1 31 2.5 33C4 34.5 6 32 7.5 28" fill="#FF8040" stroke="#D97A3A" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Dorsal fin - spiky cute -->
  <path d="M15 10.5C16 6 19 4.5 21.5 6.5C22.5 7.5 21 10 18 11" fill="#FF8040" stroke="#D97A3A" stroke-width="0.5"/>

  <!-- Ventral fin -->
  <path d="M16 30C14.5 33 15.5 34.5 17 33.5C18 32.5 17.5 31 17 30" fill="#FF8040" stroke="#D97A3A" stroke-width="0.4"/>

  <!-- Pectoral fin -->
  <path d="M13 23C10 26 10 28 12 27.5C14 27 14 25 14 23.5" fill="#FF8040" stroke="#D97A3A" stroke-width="0.4"/>

  <!-- Big cute eye - white -->
  <circle cx="25" cy="17" r="5" fill="white" stroke="#D97A3A" stroke-width="0.5"/>
  <!-- Pupil -->
  <circle cx="26.5" cy="16.5" r="3" fill="#1A1A2E"/>
  <!-- Eye highlights -->
  <circle cx="28" cy="15" r="1.3" fill="white"/>
  <circle cx="25.5" cy="17.5" r="0.6" fill="white" opacity="0.7"/>

  <!-- Rosy cheeks -->
  <ellipse cx="22" cy="23" rx="3" ry="1.8" fill="#FF7A8A" opacity="0.3"/>

  <!-- Happy smile -->
  <path d="M27 23C28.5 25 30.5 25 32 23" fill="none" stroke="#D97A3A" stroke-width="1" stroke-linecap="round"/>

  <!-- Cute mouth pout -->
  <ellipse cx="33" cy="21.5" rx="1" ry="0.7" fill="#FF8040" stroke="#D97A3A" stroke-width="0.3"/>

  <!-- Scales pattern -->
  <path d="M11 19C13 21 13 23 11 25" fill="none" stroke="#E88A4A" stroke-width="0.4" opacity="0.3"/>
  <path d="M14 18C16 20 16 22 14 24" fill="none" stroke="#E88A4A" stroke-width="0.4" opacity="0.3"/>
  <path d="M12 23C14 25 14 27 12 29" fill="none" stroke="#E88A4A" stroke-width="0.4" opacity="0.25"/>

  <!-- Bubbles -->
  <circle cx="34" cy="11" r="1.5" fill="none" stroke="#7EC8E3" stroke-width="0.6" opacity="0.5"/>
  <circle cx="37" cy="7" r="1" fill="none" stroke="#7EC8E3" stroke-width="0.5" opacity="0.4"/>
  <circle cx="35.5" cy="14.5" r="0.7" fill="none" stroke="#7EC8E3" stroke-width="0.4" opacity="0.35"/>

  <!-- Sparkle -->
  <g opacity="0.4" fill="#FFE066">
    <path d="M36 3L36.5 5L37 3L36.5 1Z" stroke="none"/>
    <path d="M35 3L37 3.5L35 4L33 3.5Z" stroke="none"/>
  </g>
</svg>
