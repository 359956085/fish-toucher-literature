<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Fish body - round and cute -->
  <ellipse cx="20" cy="20" rx="12" ry="10" fill="#FFB347" stroke="#E8922D" stroke-width="1"/>
  <!-- Belly - lighter area -->
  <ellipse cx="20" cy="23" rx="8" ry="5" fill="#FFD699" opacity="0.6"/>
  <!-- Body shine -->
  <ellipse cx="16" cy="16" rx="4" ry="2.5" fill="#FFCE80" opacity="0.5" transform="rotate(-15 16 16)"/>

  <!-- Tail fin - cute round tail -->
  <path d="M8 20C5 16 3 13 4 11C5 9.5 7 11 8 14" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.7" stroke-linejoin="round"/>
  <path d="M8 20C5 24 3 27 4 29C5 30.5 7 29 8 26" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Dorsal fin - small and cute -->
  <path d="M17 10.5C18 7.5 21 6 23 8C23.5 9 22 10.5 20 11" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.6"/>

  <!-- Pectoral fin - tiny flipper -->
  <path d="M14 22C12 24 11 26 13 26.5C14.5 27 15 25 15 23" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.5"/>

  <!-- Big cute eye - left -->
  <circle cx="24" cy="17" r="4.5" fill="white" stroke="#E8922D" stroke-width="0.6"/>
  <circle cx="25.5" cy="16.5" r="2.5" fill="#2D2D2D"/>
  <circle cx="26.5" cy="15.5" r="1" fill="white"/>
  <circle cx="24.5" cy="17.5" r="0.5" fill="white" opacity="0.6"/>

  <!-- Rosy cheek -->
  <ellipse cx="22" cy="22" rx="2.5" ry="1.5" fill="#FF8FA0" opacity="0.35"/>

  <!-- Cute smile -->
  <path d="M26 22C27 23.5 29 23.5 30 22" fill="none" stroke="#E8922D" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Tiny lips/mouth pout -->
  <circle cx="31" cy="21" r="0.8" fill="#FF9A3C" stroke="#E8922D" stroke-width="0.3"/>

  <!-- Scales - subtle cute pattern -->
  <path d="M12 18C13.5 19.5 13.5 21.5 12 23" fill="none" stroke="#F0A030" stroke-width="0.4" opacity="0.35"/>
  <path d="M15 17C16.5 18.5 16.5 20.5 15 22" fill="none" stroke="#F0A030" stroke-width="0.4" opacity="0.35"/>
  <path d="M13 21C14.5 22.5 14.5 24.5 13 26" fill="none" stroke="#F0A030" stroke-width="0.4" opacity="0.3"/>

  <!-- Bubbles -->
  <circle cx="33" cy="12" r="1.2" fill="none" stroke="#90CDF4" stroke-width="0.5" opacity="0.6"/>
  <circle cx="36" cy="9" r="0.8" fill="none" stroke="#90CDF4" stroke-width="0.4" opacity="0.5"/>
  <circle cx="34.5" cy="15" r="0.6" fill="none" stroke="#90CDF4" stroke-width="0.4" opacity="0.4"/>
</svg>
